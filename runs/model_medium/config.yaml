data:
  data_dir: data
  i3rab_path: null
  qac_max_verses: null
  synthetic_per_type: 2000
  tashkeela_n: 30000
evaluation:
  early_stopping_patience: 3
  eval_every_n_steps: 2000
  val_split: 0.1
heads:
  dropout: 0.1
loss:
  alpha_diac: 1.0
  beta_irab: 0.5
  gamma_err: 0.3
  label_smoothing: 0.1
model:
  dropout: 0.1
  hidden: 768
  max_len: 512
  n_heads: 12
  n_layers: 12
training:
  batch_size: 8
  gradient_clip: 1.0
  learning_rate: 0.0003
  log_every_n_steps: 50
  mixed_precision: fp16
  n_epochs: 15
  num_workers: 4
  seed: 42
  warmup_steps: 1000
  weight_decay: 0.01
