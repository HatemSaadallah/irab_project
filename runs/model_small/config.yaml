data:
  data_dir: data
  i3rab_path: null
  qac_max_verses: null
  synthetic_per_type: 500
  tashkeela_n: 3000
evaluation:
  early_stopping_patience: 2
  eval_every_n_steps: 1000
  val_split: 0.1
heads:
  dropout: 0.1
loss:
  alpha_diac: 1.0
  beta_irab: 0.5
  gamma_err: 0.3
  label_smoothing: 0.1
model:
  dropout: 0.1
  hidden: 256
  max_len: 256
  n_heads: 8
  n_layers: 6
training:
  batch_size: 32
  gradient_clip: 1.0
  learning_rate: 0.0003
  log_every_n_steps: 50
  mixed_precision: none
  n_epochs: 5
  num_workers: 2
  seed: 42
  warmup_steps: 300
  weight_decay: 0.01
