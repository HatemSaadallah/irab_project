# Production config — 60M params, matches CATT's capacity.
# Requires T4 (16GB) minimum. Target: 4-6 hour training run.

model:
  hidden: 768
  n_heads: 12
  n_layers: 12
  max_len: 256
  dropout: 0.1

heads:
  dropout: 0.1

loss:
  alpha_diac: 1.0
  beta_irab: 0.5
  gamma_err: 0.3
  label_smoothing: 0.1

data:
  tashkeela_n: 90000
  qac_max_verses: null
  i3rab_path: null            # set to data/i3rab/i3rab.conllu once you have access
  synthetic_per_type: 2000
  data_dir: data

training:
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 0.01
  n_epochs: 15
  warmup_steps: 1000
  gradient_clip: 1.0
  mixed_precision: bf16
  num_workers: 4
  seed: 42
  log_every_n_steps: 50

evaluation:
  val_split: 0.1
  eval_every_n_steps: 2000
  early_stopping_patience: 3
